name: GCC News Daily
on:
  schedule:
    - cron: '30 3 * * *' # This is 9:00 AM India Time
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python main.py
